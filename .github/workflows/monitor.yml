name: ICT Tweet Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install feedparser deep-translator requests

      - name: 트윗 모니터링 실행
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python monitor.py

      - name: 마지막 트윗 ID 저장
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          touch last_tweet_id.txt
          git add last_tweet_id.txt
          git diff --staged --quiet || git commit -m "Update last tweet ID"
          git push || true
